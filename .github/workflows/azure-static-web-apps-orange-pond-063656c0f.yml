- name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"       # Onde está o index.html
          api_location: ""        # Explicitamente vazio (remove a busca por DB/API)
          output_location: ""     # Explicitamente vazio para HTML puro
          skip_app_build: true    # Pula a tentativa de compilar scripts
