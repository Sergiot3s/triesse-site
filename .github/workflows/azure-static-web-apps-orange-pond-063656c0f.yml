- name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"          # Onde está seu index.html
          api_location: ""           # Deixe vazio se não tiver funções/API
          output_location: ""        # Deixe vazio para HTML puro
          skip_app_build: true       # Importante para não tentar rodar npm/build
